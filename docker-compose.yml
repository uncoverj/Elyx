version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: elyx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  bot:
    build:
      context: ./bot
    env_file:
      - ./.env
    depends_on:
      - backend

  webapp:
    build:
      context: ./webapp
    env_file:
      - ./.env
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pg_data:
